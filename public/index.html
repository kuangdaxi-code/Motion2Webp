<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Motion2WebP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;320;330;340;400;480;540;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Figma-style palette */
    --primary: #000000;
    --on-primary: #ffffff;
    --ink: #000000;
    --ink-2: #1d1d1f;
    --ink-dim: #6e6e73;
    --canvas: #ffffff;
    --inverse-canvas: #000000;
    --inverse-ink: #ffffff;
    --hairline: #e6e6e6;
    --hairline-soft: #f1f1f1;
    --surface-soft: #f5f5f5;
    --block-blue: #dbeefc;
    --block-blue-hover: #cee6f8;
    --block-lime: #dceeb1;
    --block-lilac: #c5b0f4;
    --block-cream: #f4ecd6;
    --block-pink: #efd4d4;
    --block-mint: #c8e6cd;
    --block-coral: #f3c9b6;
    --block-navy: #1f1d3d;
    --accent-magenta: #ff3d8b;
    --success: #1ea64a;

    /* Radii */
    --r-xs: 2px;
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 20px;
    --r-xl: 32px;
    --r-pill: 50px;
    --r-full: 9999px;

    /* Spacing */
    --sp-xxs: 4px;
    --sp-xs: 8px;
    --sp-sm: 12px;
    --sp-md: 16px;
    --sp-lg: 24px;
    --sp-xl: 32px;
    --sp-xxl: 48px;
    --sp-section: 96px;

    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  html[data-theme="dark"] {
    --primary: #ffffff;
    --on-primary: #000000;
    --ink: #f5f5f7;
    --ink-2: #f5f5f7;
    --ink-dim: #98989d;
    --canvas: #121212;
    --inverse-canvas: #ffffff;
    --inverse-ink: #000000;
    --hairline: #333333;
    --hairline-soft: #222222;
    --surface-soft: #1e1e1e;
    --block-blue: #1a2a3c;
    --block-blue-hover: #22344a;
    --block-lime: #2a3a18;
    --block-mint: #1a3622;
    --success: #30d158;
  }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) {
      --primary: #ffffff;
      --on-primary: #000000;
      --ink: #f5f5f7;
      --ink-2: #f5f5f7;
      --ink-dim: #98989d;
      --canvas: #121212;
      --inverse-canvas: #ffffff;
      --inverse-ink: #000000;
      --hairline: #333333;
      --hairline-soft: #222222;
      --surface-soft: #1e1e1e;
      --block-blue: #1a2a3c;
      --block-blue-hover: #22344a;
      --block-lime: #2a3a18;
      --block-mint: #1a3622;
      --success: #30d158;
    }
  }

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { margin: 0; padding: 0; }
  body {
    background-color: var(--canvas);
    background-image: radial-gradient(var(--dot-color, #ececec) 1px, transparent 1px),
                      radial-gradient(var(--dot-color, #ececec) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: 0 0, 12px 12px;
    color: var(--ink-2);
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "PingFang SC", "Inter", system-ui, sans-serif;
    font-size: 14px; font-weight: 400; line-height: 1.5;
    letter-spacing: -0.005em;
    font-feature-settings: "kern" 1;
  }
  html[data-theme="dark"] body { --dot-color: #262626; }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) body { --dot-color: #262626; }
  }

  .mono {
    font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
    text-transform: uppercase; letter-spacing: 0.54px; font-weight: 400;
  }

  /* ================== Nav ================== */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: var(--primary);
    color: var(--on-primary);
    height: 56px;
  }
  .nav-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 100%;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 26px; height: 26px; background: var(--on-primary); color: var(--primary);
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .brand-name {
    font-size: 15px; font-weight: 600; letter-spacing: -0.008em;
    color: var(--on-primary);
  }
  .nav-actions { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    background: rgba(255,255,255,0.1); color: var(--on-primary);
    width: 40px; height: 40px; border-radius: var(--r-full);
    border: 0; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background-color .18s var(--ease);
  }
  .icon-btn:hover { background: rgba(255,255,255,0.2); }
  .icon-btn svg { width: 18px; height: 18px; }
  .icon-btn .ico-sun, .icon-btn .ico-moon { display: none; }
  html[data-theme="light"] .icon-btn .ico-moon { display: inline; }
  html[data-theme="dark"] .icon-btn .ico-sun { display: inline; }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) .icon-btn .ico-sun { display: inline; }
    html:not([data-theme="light"]) .icon-btn .ico-moon { display: none; }
  }
  @media (prefers-color-scheme: light) {
    html:not([data-theme="dark"]) .icon-btn .ico-moon { display: inline; }
    html:not([data-theme="dark"]) .icon-btn .ico-sun { display: none; }
  }

  /* ================== Buttons ================== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    height: 40px; padding: 0 24px;
    border-radius: var(--r-pill);
    font-family: inherit;
    font-size: 14px; font-weight: 600; line-height: 1.4; letter-spacing: -0.005em;
    border: 0; cursor: pointer;
    transition: background-color .18s var(--ease), color .18s var(--ease),
                transform .18s var(--ease);
  }
  .btn.primary { background: var(--primary); color: var(--on-primary); }
  .btn.primary:hover { background: #1a1a1a; }
  .btn.primary:active { transform: scale(0.98); }
  .btn.secondary {
    background: var(--canvas); color: var(--ink-2);
    padding: 0 24px;
    border: 1px solid var(--hairline);
  }
  .btn.secondary:hover { background: var(--surface-soft); }
  .btn.magenta {
    background: var(--accent-magenta); color: var(--on-primary);
    padding: 10px 18px;
  }
  .btn.magenta:hover { filter: brightness(1.05); }
  .btn.text {
    background: transparent; color: var(--ink-2);
    height: 40px; padding: 8px 12px;
    font-size: 13px; font-weight: 500;
    border-radius: var(--r-full);
  }
  .btn.text:hover { background: var(--surface-soft); }
  .btn.small {
    height: 30px; padding: 0 14px; font-size: 13px; font-weight: 500;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ================== Layout ================== */
  .container {
    max-width: 1080px; margin: 0 auto;
    padding: 0 32px 48px;
  }

  /* ================== Hero ================== */
  .hero {
    padding: 40px 0 28px;
    max-width: 1080px;
    text-align: left;
    margin: 0 auto;
  }
  .eyebrow { display: none; }
  .hero h1 {
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "PingFang SC", "Inter", system-ui, sans-serif;
    font-size: 32px; font-weight: 700; line-height: 1.1; letter-spacing: -0.028em;
    margin: 0 0 10px; color: var(--ink-2);
  }
  .hero .sub {
    font-size: 14px; font-weight: 400; line-height: 1.55; letter-spacing: -0.005em;
    color: var(--ink-dim); max-width: 720px; margin: 0;
  }

  /* ================== Section ================== */
  .section { margin-top: 40px; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
    gap: 16px; flex-wrap: wrap;
  }
  .section-head h2 {
    font-size: 15px; font-weight: 600; line-height: 1.35; letter-spacing: -0.008em;
    margin: 0; color: var(--ink-2);
  }
  .section-head .head-note {
    font-family: inherit; text-transform: none;
    font-size: 13px; font-weight: 400; letter-spacing: -0.005em;
    color: var(--ink-dim);
  }
  .section-head .head-actions { display: flex; align-items: center; gap: 16px; }
  .section-link {
    background: transparent; border: 0; padding: 4px 2px;
    font-family: inherit; font-size: 13px; font-weight: 400; letter-spacing: -0.005em;
    color: #0071e3; cursor: pointer; border-radius: var(--r-full);
    transition: color .18s var(--ease);
    text-decoration: none;
  }
  .section-link:hover { background: transparent; color: #0077ed; }

  /* ================== Drop (light blue block) ================== */
  .drop {
    background: var(--block-blue);
    border-radius: var(--r-lg);
    padding: 24px 32px;
    text-align: center;
    transition: background-color .2s var(--ease);
    border: 0;
  }
  .drop.drag { background: var(--block-blue-hover); }
  .drop-inner {
    max-width: 720px; margin: 0 auto;
    text-align: center;
    padding: 20px 0;
  }
  .drop h2 {
    font-family: inherit;
    font-size: 15px; font-weight: 600; line-height: 1.4; letter-spacing: -0.008em;
    margin: 0 0 22px; color: var(--ink-2);
  }
  .drop p {
    font-size: 13px; font-weight: 400; line-height: 1.5; letter-spacing: -0.005em;
    color: var(--ink-dim); margin: 0 0 20px;
  }
  .drop-actions { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .drop-note {
    margin-top: 20px;
    font-family: inherit; text-transform: none;
    font-size: 12px; letter-spacing: -0.005em;
    color: var(--ink-dim);
  }

  .adv-row {
    display: flex; align-items: center; justify-content: center;
    margin-top: 18px;
  }
  .adv-toggle {
    background: transparent; border: 0; cursor: pointer;
    font-family: inherit; text-transform: none;
    font-size: 13px; font-weight: 400; letter-spacing: -0.005em;
    color: var(--ink-dim); opacity: 1;
    padding: 6px 8px; border-radius: var(--r-full);
    transition: color .18s var(--ease);
  }
  .adv-toggle:hover { color: var(--ink-2); background: transparent; }
  .adv-toggle .modify { color: #0071e3; margin-left: 4px; }
  .adv-toggle:hover .modify { color: #0077ed; }

  /* ================== Empty state ================== */
  .empty {
    background: var(--surface-soft);
    border-radius: var(--r-lg);
    padding: 60px 40px;
    text-align: center;
  }
  .empty-title {
    font-family: inherit;
    font-size: 15px; font-weight: 600; letter-spacing: -0.008em;
    margin: 0 0 6px; color: var(--ink-2);
  }
  .empty-sub {
    font-family: inherit; text-transform: none;
    font-size: 13px; letter-spacing: -0.005em; font-weight: 400;
    color: var(--ink-dim);
  }

  /* ================== Task Card ================== */
  .task-card {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    padding: 32px;
    margin-bottom: 16px;
    animation: fadeIn .35s var(--ease);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }
  .task-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 24px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .task-title {
    font-size: 24px; font-weight: 700; line-height: 1.45; letter-spacing: 0;
    margin: 0 0 4px;
  }
  .task-sub {
    font-family: "JetBrains Mono", "SF Mono", monospace;
    text-transform: uppercase;
    font-size: 12px; letter-spacing: 0.60px; color: var(--ink); opacity: 0.6;
  }
  .task-actions { display: flex; gap: 8px; }

  .task-progress {
    height: 4px; background: var(--hairline); border-radius: var(--r-full);
    overflow: hidden;
  }
  .task-progress-bar {
    height: 100%; width: 0%; background: var(--primary);
    border-radius: var(--r-full);
    transition: width .3s var(--ease), background-color .2s var(--ease);
  }
  .task-card[data-status="done"] .task-progress-bar { background: var(--success); }

  .task-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    margin-top: 24px;
  }
  @media (max-width: 720px) {
    .task-stats { grid-template-columns: repeat(2, 1fr); }
  }
  .stat {
    padding: 16px;
    background: var(--surface-soft); border-radius: var(--r-md);
  }
  .stat .label {
    font-family: "JetBrains Mono", "SF Mono", monospace;
    text-transform: uppercase; font-size: 12px; letter-spacing: 0.60px;
    opacity: 0.6; margin-bottom: 6px;
  }
  .stat .value {
    font-size: 20px; font-weight: 480; letter-spacing: -0.10px;
  }

  /* File list (merged summary) */
  .file-list {
    margin-top: 24px;
    border-top: 1px solid var(--hairline-soft);
    padding-top: 16px;
  }
  .file-item {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 0;
    font-size: 16px; font-weight: 330; letter-spacing: -0.14px;
  }
  .file-item + .file-item { border-top: 1px solid var(--hairline-soft); }
  .file-name {
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--ink);
  }
  .file-status {
    font-family: "JetBrains Mono", "SF Mono", monospace;
    text-transform: uppercase; font-size: 12px; letter-spacing: 0.60px;
    color: var(--ink); opacity: 0.6; white-space: nowrap;
  }
  .file-status.done { color: var(--success); opacity: 1; }
  .file-status.failed { color: var(--accent-magenta); opacity: 1; }
  .file-status.run { color: var(--ink); opacity: 1; }
  .file-dl {
    color: var(--ink); text-decoration: none;
    font-family: inherit; font-size: 14px; font-weight: 480;
    padding: 6px 14px; border-radius: var(--r-pill);
    border: 1px solid var(--hairline);
    transition: background-color .18s var(--ease);
  }
  .file-dl:hover { background: var(--surface-soft); }

  /* Auto tip (banner) */
  .auto-tip {
    margin-top: 20px; padding: 16px 24px;
    background: var(--block-mint);
    border-radius: var(--r-md);
    font-size: 16px; font-weight: 330; letter-spacing: -0.14px;
    color: var(--ink);
  }

  /* Recent */
  .recent-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .recent-card {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--canvas); border-radius: var(--r-md);
    border: 1px solid var(--hairline);
    transition: background-color .18s var(--ease);
  }
  .recent-card:hover { background: var(--surface-soft); }
  .recent-info { flex: 1; min-width: 0; }
  .recent-name {
    font-family: inherit;
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--ink-2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .recent-meta {
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    text-transform: none;
    font-size: 11px; letter-spacing: 0; font-weight: 400;
    color: var(--ink-dim); margin-top: 4px;
  }
  .recent-card .rdl {
    color: var(--ink-2); text-decoration: none;
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: var(--r-pill);
    border: 1px solid var(--hairline); background: var(--canvas);
    transition: background-color .18s var(--ease);
  }
  .recent-card .rdl:hover { background: var(--surface-soft); }

  /* ================== Sheet ================== */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none;
    transition: opacity .3s var(--ease);
    z-index: 100;
  }
  .sheet-backdrop.show { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 50%; bottom: 0;
    transform: translate(-50%, 100%);
    width: min(560px, calc(100% - 24px));
    background: var(--canvas);
    border-radius: var(--r-lg) var(--r-lg) 0 0;
    z-index: 101;
    padding: 24px 32px 32px;
    max-height: 80vh; overflow: auto;
    transition: transform .35s var(--ease);
  }
  @media (min-width: 640px) {
    .sheet { bottom: 24px; border-radius: var(--r-lg); }
  }
  .sheet.show { transform: translate(-50%, 0); }
  .sheet-grabber {
    width: 44px; height: 4px; border-radius: var(--r-full); background: var(--hairline);
    margin: 0 auto 16px;
  }
  .sheet-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .sheet-title {
    font-size: 26px; font-weight: 540; letter-spacing: -0.26px;
  }
  .sheet-close {
    background: var(--surface-soft); border: 0;
    width: 32px; height: 32px; border-radius: var(--r-full);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .sheet-close:hover { background: var(--hairline); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  .field label {
    display: block;
    font-family: "JetBrains Mono", "SF Mono", monospace;
    text-transform: uppercase; font-size: 12px; letter-spacing: 0.60px;
    margin-bottom: 8px; opacity: 0.7;
  }
  .field input, .field select {
    width: 100%; height: 44px;
    padding: 12px 14px;
    background: var(--canvas); color: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: var(--r-md);
    font-family: inherit;
    font-size: 18px; font-weight: 320; letter-spacing: -0.26px;
    outline: none;
    transition: border-color .18s var(--ease);
  }
  .field input:focus, .field select:focus { border-color: var(--primary); }

  /* ================== Toast ================== */
  .status-toast {
    position: fixed; top: 68px; left: 50%; transform: translate(-50%, -16px);
    background: var(--primary); color: var(--on-primary);
    padding: 12px 20px; border-radius: var(--r-pill);
    display: flex; align-items: center; gap: 12px;
    opacity: 0; pointer-events: none;
    transition: opacity .3s var(--ease), transform .3s var(--ease);
    z-index: 9999;
    max-width: 480px;
  }
  .status-toast.show {
    opacity: 1; transform: translate(-50%, 0); pointer-events: auto;
  }
  .status-toast .title {
    font-size: 16px; font-weight: 480; letter-spacing: -0.14px;
  }
  .status-toast .sub {
    font-family: "JetBrains Mono", "SF Mono", monospace;
    font-size: 12px; letter-spacing: 0.60px; text-transform: uppercase;
    opacity: 0.7;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px;
  }
  .status-toast .close {
    background: rgba(255,255,255,0.14); border: 0; color: var(--on-primary);
    width: 24px; height: 24px; border-radius: var(--r-full);
    cursor: pointer; font-size: 11px;
  }
  .spin {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.32); border-top-color: var(--on-primary);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Marquee strip under nav */
  .marquee-strip {
    background: var(--inverse-canvas); color: var(--inverse-ink);
    height: 36px; display: flex; align-items: center; justify-content: center;
    font-family: "JetBrains Mono", "SF Mono", monospace;
    font-size: 12px; letter-spacing: 0.60px; text-transform: uppercase;
    padding: 0 24px;
  }

  @media (max-width: 720px) {
    .hero { padding: 48px 0 32px; }
    .hero h1 { font-size: 48px; letter-spacing: -0.96px; }
    .drop { padding: 32px 20px; }
    .drop h2 { font-size: 40px; letter-spacing: -0.6px; }
    .task-card { padding: 24px; }
    .container { padding: 0 20px 60px; }
    .nav-inner { padding: 0 20px; }
  }
</style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <div class="brand">
        <span class="brand-mark">M</span>
        <span class="brand-name">Motion2WebP</span>
      </div>
      <div class="nav-actions">
        <button id="themeToggle" class="icon-btn" title="切换外观" aria-label="切换外观">

// ============ ffmpeg.wasm (browser-side) ============
import { FFmpeg } from 'https://esm.sh/@ffmpeg/ffmpeg@0.12.10';
import { fetchFile, toBlobURL } from 'https://esm.sh/@ffmpeg/util@0.12.1';

const CORE_BASE = '/vendor/ffmpeg-core';
let _ffmpeg = null;
let _ffmpegLoading = null;
let _currentJobProgressCb = null;

async function getFFmpeg(onLoadProgress){
  if (_ffmpeg) return _ffmpeg;
  if (_ffmpegLoading) return _ffmpegLoading;
  _ffmpegLoading = (async () => {
    const ff = new FFmpeg();
    ff.on('log', ({ message }) => { /* console.log('[ffmpeg]', message); */ });
    ff.on('progress', ({ progress }) => {
      if (_currentJobProgressCb) _currentJobProgressCb(Math.max(0, Math.min(1, progress)));
    });
    if (onLoadProgress) onLoadProgress(0.05, '正在加载 WebAssembly 引擎…');
    const coreURL = await toBlobURL(`${CORE_BASE}/ffmpeg-core.js`, 'text/javascript');
    if (onLoadProgress) onLoadProgress(0.25, '正在加载 WebAssembly 引擎…');
    const wasmURL = await toBlobURL(`${CORE_BASE}/ffmpeg-core.wasm`, 'application/wasm');
    if (onLoadProgress) onLoadProgress(0.75, '正在加载 WebAssembly 引擎…');
    const workerURL = await toBlobURL(`${CORE_BASE}/ffmpeg-core.worker.js`, 'text/javascript');
    if (onLoadProgress) onLoadProgress(0.9, '正在初始化引擎…');
    await ff.load({ coreURL, wasmURL, workerURL });
    if (onLoadProgress) onLoadProgress(1, '引擎就绪');
    _ffmpeg = ff;
    return ff;
  })();
  return _ffmpegLoading;
}

async function resetFFmpeg(){
  try { if (_ffmpeg) _ffmpeg.terminate(); } catch(e){}
  _ffmpeg = null;
  _ffmpegLoading = null;
  _currentJobProgressCb = null;
}

// Multi-pass encode until size <= 100MB (mirrors server logic, browser-side)
const MAX_SIZE = 100 * 1024 * 1024;
async function convertToWebp(ff, file, baseOpts, onProgress, isCanceled){
  const inName = 'in_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
  const inPath = `${inName}.${ext}`;
  const outPath = `${inName}.webp`;
  await ff.writeFile(inPath, await fetchFile(file));

  const passes = [];
  passes.push({ fps: baseOpts.fps, quality: baseOpts.quality, resize: baseOpts.resize });
  // fallback ladders if too large
  passes.push({ fps: Math.max(15, Math.min(baseOpts.fps, 20)), quality: Math.max(50, baseOpts.quality - 15), resize: baseOpts.resize });
  passes.push({ fps: 15, quality: 45, resize: baseOpts.resize ? Math.min(baseOpts.resize, 960) : 960 });
  passes.push({ fps: 12, quality: 35, resize: 720 });

  let outData = null;
  let lastAttempt = null;
  for (let i = 0; i < passes.length; i++) {
    if (isCanceled()) throw new Error('canceled');
    const p = passes[i];
    lastAttempt = p;
    const args = ['-y', '-i', inPath];
    const vf = [];
    vf.push(`fps=${p.fps}`);
    if (p.resize) vf.push(`scale=${p.resize}:-2:flags=lanczos`);
    args.push('-vf', vf.join(','));
    args.push('-vcodec', 'libwebp');
    args.push('-lossless', baseOpts.lossless ? '1' : '0');
    args.push('-compression_level', '4');
    args.push('-q:v', String(p.quality));
    args.push('-loop', '0');
    args.push('-preset', 'default');
    args.push('-an');
    args.push('-vsync', '0');
    args.push(outPath);

    _currentJobProgressCb = (pr) => onProgress(pr, i, passes.length);
    try {
      await ff.exec(args);
    } finally {
      _currentJobProgressCb = null;
    }
    try {
      outData = await ff.readFile(outPath);
    } catch(e){
      outData = null;
    }
    try { await ff.deleteFile(outPath); } catch(e){}
    if (!outData) throw new Error('编码失败');
    if (outData.byteLength <= MAX_SIZE) break;
    if (i === passes.length - 1) break;
  }

  try { await ff.deleteFile(inPath); } catch(e){}
  return { data: outData, attempt: lastAttempt };
}

// ============ Utils ============
function fmtSize(n){
  if (!n) return '-';
  const u = ['B','KB','MB','GB']; let i = 0;
  while (n >= 1024 && i < u.length-1) { n/=1024; i++; }
  return n.toFixed(n<10?2:1)+' '+u[i];
}
function fmtTime(s){
  if (!isFinite(s) || s <= 0) return '-';
  if (s < 1) return '<1s';
  s = Math.round(s);
  if (s < 60) return s+'s';
  const m = Math.floor(s/60), sec = s%60;
  return m+'m'+(sec?(' '+sec+'s'):'');
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

let _audioCtx = null;
function playChime(){
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _audioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const notes = [
      { freq: 1318.51, start: 0.00, dur: 0.13 },
      { freq: 1567.98, start: 0.13, dur: 0.13 },
      { freq: 2093.00, start: 0.26, dur: 0.28 }
    ];
    const now = ctx.currentTime;
    for (const n of notes) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = n.freq;
      gain.gain.setValueAtTime(0, now + n.start);
      gain.gain.linearRampToValueAtTime(0.32, now + n.start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + n.start + n.dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + n.start);
      osc.stop(now + n.start + n.dur + 0.02);
    }
  } catch(e){}
}
function triggerDownload(url){

  a.href = url; a.download = ''; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  setTimeout(() => a.remove(), 1000);
}
function triggerDownloadNamed(url, name){
  const a = document.createElement('a');
  a.href = url; a.download = name || ''; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  setTimeout(() => a.remove(), 1000);
}

// ============ Expand ZIP inputs (browser-side) ============
async function expandFiles(fileList){
  const out = [];
  for (const f of fileList) {
    const isZip = /\.zip$/i.test(f.name) || f.type === 'application/zip' || f.type === 'application/x-zip-compressed';
    if (isZip && window.JSZip) {
      try {
        const zip = await JSZip.loadAsync(f);
        const entries = Object.values(zip.files).filter(e => !e.dir);
        for (const e of entries) {
          if (!/\.(mp4|mov|m4v|webm|mkv|avi|gif)$/i.test(e.name)) continue;
          const blob = await e.async('blob');
          out.push(new File([blob], e.name.split('/').pop(), { type: blob.type || 'video/mp4' }));
        }
      } catch(err){
        console.warn('ZIP 解析失败', err);
      }
    } else {
      out.push(f);
    }
  }
  return out;
}

// ============ Convert (browser-side) ============
let batchCounter = 0;
const _blobUrls = new Map(); // key: `${jobId}|${outName}` -> objectURL

async function uploadFiles(rawFiles){
  if (!rawFiles || !rawFiles.length) return;
  batchCounter++;
  const batchNo = batchCounter;
  const jobId = 'job_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);

  const files = await expandFiles(Array.from(rawFiles));
  if (!files.length) return;

  const opts = rushMode ? {
    fps: 25, quality: 70, lossless: false, resize: undefined
  } : {
    fps: parseInt(document.getElementById('fps').value, 10) || 30,
    quality: parseInt(document.getElementById('quality').value, 10) || 80,
    resize: parseInt(document.getElementById('resize').value, 10) || undefined,
    lossless: document.getElementById('lossless').value === 'true',
  };
  const modeLabel = rushMode ? '急速' : '标准';

  const card = createTaskCard(batchNo, files.length, modeLabel);
  card.dataset.jobId = jobId;
  updateEmpty();

  const state = {
    id: jobId,
    total: files.length,
    done: 0,
    failed: 0,
    status: 'running',
    startedAt: Date.now(),
    current: '',
    currentProgress: 0,
    items: files.map(f => ({ name: f.name, outName: f.name.replace(/\.[^.]+$/, '') + '.webp', size: 0, status: 'pending', progress: 0 })),
  };
  card._state = state;
  card._canceled = false;

  // Ensure ffmpeg is loaded (show progress on card)
  try {
    if (!_ffmpeg) {
      state.current = '加载 WebAssembly 引擎（约 30MB，仅首次）';
      renderTask(card, snapshot(state));
      await getFFmpeg((p, msg) => {
        state.current = msg + ' ' + Math.round(p * 100) + '%';
        state.currentProgress = p * 0.02; // 引擎加载算 2% 的整体进度感
        renderTask(card, snapshot(state));
      });
    }
  } catch(e) {
    state.status = 'error';
    state.current = '引擎加载失败：' + e.message;
    renderTask(card, snapshot(state));
    card.dataset.status = 'done';
    return;
  }

  const ff = _ffmpeg;

  for (let i = 0; i < files.length; i++) {
    if (card._canceled) break;
    const f = files[i];
    const item = state.items[i];
    item.status = 'running';
    state.current = f.name;
    state.currentProgress = 0;

    try {
      const { data } = await convertToWebp(ff, f, opts,
        (progress) => {
          item.progress = progress;
          state.currentProgress = progress;
          renderTask(card, snapshot(state));
        },
        () => card._canceled
      );
      if (card._canceled) throw new Error('canceled');

      const blob = new Blob([data.buffer], { type: 'image/webp' });
      const url = URL.createObjectURL(blob);
      _blobUrls.set(jobId + '|' + item.outName, url);
      item.status = 'done';
      item.size = blob.size;
      item.progress = 1;
      state.done++;
    } catch(err) {
      if (err && err.message === 'canceled') {
        item.status = 'failed';
        // reset engine (terminated state)
        await resetFFmpeg();
      } else {
        console.warn('convert failed', f.name, err);
        item.status = 'failed';
        state.failed++;
        state.done++;
      }
    }
    state.elapsed = (Date.now() - state.startedAt) / 1000;
    // rough ETA
    const per = state.done > 0 ? state.elapsed / state.done : 0;
    state.eta = per > 0 ? per * (state.total - state.done) : 0;
    renderTask(card, snapshot(state));
  }

  state.status = card._canceled ? 'error' : 'done';
  state.currentProgress = 0;
  state.current = card._canceled ? '已取消' : '完成';
  state.elapsed = (Date.now() - state.startedAt) / 1000;
  state.eta = 0;
  renderTask(card, snapshot(state));
  card.dataset.status = 'done';
}

function snapshot(s){
  // shallow clone for render
  return {
    id: s.id, total: s.total, done: s.done, failed: s.failed,
    status: s.status, elapsed: s.elapsed || (Date.now() - s.startedAt)/1000,
    eta: s.eta, current: s.current, currentProgress: s.currentProgress || 0,
    items: s.items.map(x => ({ ...x })),
  };
}

async function downloadZip(card){
  const s = card._state; if (!s) return;
  const zip = new JSZip();
  let count = 0;
  for (const it of s.items) {
    if (it.status !== 'done') continue;
    const url = _blobUrls.get(s.id + '|' + it.outName);
    if (!url) continue;
    const blob = await (await fetch(url)).blob();
    zip.file(it.outName, blob);
    count++;
  }
  if (!count) return;
  const out = await zip.generateAsync({ type: 'blob' });
  const zipName = `motion2webp_batch_${s.id}.zip`;
  const url = URL.createObjectURL(out);
  triggerDownloadNamed(url, zipName);
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

function createTaskCard(batchNo, count, modeLabel){
  const card = document.createElement('div');
  card.className = 'task-card';
  card.dataset.status = 'running';
  card._autoDownloaded = new Set();
  card._zipDownloaded = false;
  card._recentTracked = new Set();
  card.innerHTML = `
    <div class="task-header">
      <div>
        <h3 class="task-title">批次 #${batchNo}</h3>
        <div class="task-sub">${modeLabel} · ${count} 个文件</div>
      </div>
      <div class="task-actions">
        <button class="btn small secondary dl-all" style="display:none;">下载 ZIP</button>
        <button class="btn small text cancel">取消</button>
        <button class="btn small text remove">移除</button>
      </div>
    </div>
    <div class="task-progress"><div class="task-progress-bar"></div></div>
    <div class="task-stats">
      <div class="stat"><div class="label">Done</div><div class="value stat-done">0 / ${count}</div></div>
      <div class="stat"><div class="label">Current</div><div class="value stat-current">-</div></div>
      <div class="stat"><div class="label">Elapsed</div><div class="value stat-elapsed">0s</div></div>
      <div class="stat"><div class="label">Remaining</div><div class="value stat-eta">-</div></div>
    </div>
    <div class="file-list"></div>
  `;
  jobsEl.prepend(card);
  card.querySelector('.remove').addEventListener('click', () => { card.remove(); updateEmpty(); });
  card.querySelector('.cancel').addEventListener('click', () => {
    card._canceled = true;
    card.querySelector('.cancel').style.display = 'none';
  });
  card.querySelector('.dl-all').addEventListener('click', () => downloadZip(card));
  return card;
}

function startPolling(){ /* no-op: browser-side conversion is synchronous per-file */ }

function renderTask(card, s){
  card._lastStatus = s;
  const overall = s.total > 0 ? ((s.done + (s.currentProgress||0)) / s.total) * 100 : 0;
  card.querySelector('.task-progress-bar').style.width = Math.min(100, overall).toFixed(1) + '%';
  card.querySelector('.stat-done').textContent = `${s.done} / ${s.total}` + (s.failed ? `（失败 ${s.failed}）` : '');
  card.querySelector('.stat-current').textContent = s.current || (s.status === 'done' ? '完成' : '-');
  card.querySelector('.stat-elapsed').textContent = fmtTime(s.elapsed);
  card.querySelector('.stat-eta').textContent = s.status === 'done' ? '完成' : fmtTime(s.eta);

  const list = card.querySelector('.file-list');
  list.innerHTML = '';
  const items = s.items || [];
  for (const it of items) {
    const div = document.createElement('div');
    div.className = 'file-item';
    let status = '';
    let right = '';
    if (it.status === 'done') {
      if (!card._recentTracked.has(it.outName)) {
        card._recentTracked.add(it.outName);
        const url = _blobUrls.get(s.id + '|' + it.outName);
        addRecent({ jobId: s.id, name: it.name, outName: it.outName, size: it.size, ts: Date.now(), url });
      }
      status = `<span class="file-status done">${fmtSize(it.size)}</span>`;
      const url = _blobUrls.get(s.id + '|' + it.outName) || '#';
      right = `<a class="file-dl" href="${url}" download="${escapeHtml(it.outName)}">下载</a>`;
    } else if (it.status === 'failed') {
      status = `<span class="file-status failed">失败</span>`;
    } else if (it.status === 'running') {
      status = `<span class="file-status run">${((it.progress||0)*100).toFixed(0)}%</span>`;
    } else {
      status = `<span class="file-status">等待</span>`;
    }
    div.innerHTML = `
      <div class="file-name">${escapeHtml(it.name)}</div>
      ${status}
      ${right}
    `;
    list.appendChild(div);
  }

  // Auto-download
  if (s.total === 1) {
    const it = items[0];
    if (it && it.status === 'done' && !card._autoDownloaded.has(it.outName)) {
      card._autoDownloaded.add(it.outName);
      const url = _blobUrls.get(s.id + '|' + it.outName);
      if (url) triggerDownloadNamed(url, it.outName);
      playChime();
      showAutoTip(card, `已自动下载：${it.outName}`);
    }
  } else if (s.status === 'done' && !card._zipDownloaded) {
    const successCount = items.filter(i => i.status === 'done').length;
    if (successCount > 0) {
      card._zipDownloaded = true;
      downloadZip(card);
      playChime();
      showAutoTip(card, `已自动下载：${successCount} 个文件已打包`);
    }
  }

  if (s.status === 'done') card.querySelector('.dl-all').style.display = 'inline-flex';
}

function showAutoTip(card, msg){
  let tip = card.querySelector('.auto-tip');
  if (!tip) {
    tip = document.createElement('div');
    tip.className = 'auto-tip';
    card.appendChild(tip);
  }
  tip.textContent = '✓ ' + msg;
}

// ============ Recent ============
const RECENT_KEY = 'm2w-recent';
const RECENT_MAX = 12;
let recentExpanded = false;
const recentBlock = document.getElementById('recentBlock');
const recentList = document.getElementById('recentList');
const toggleRecentBtn = document.getElementById('toggleRecentBtn');

document.getElementById('clearRecentBtn').addEventListener('click', () => {
  try { localStorage.removeItem(RECENT_KEY); } catch(e){}
  recentExpanded = false;
  renderRecent();
});
toggleRecentBtn.addEventListener('click', () => {
  recentExpanded = !recentExpanded;
  renderRecent();
});
function loadRecent(){
  try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch(e){ return []; }
}
function saveRecent(list){
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, RECENT_MAX))); } catch(e){}
}
function addRecent(entry){
  const list = loadRecent();
  list.unshift(entry);
  const seen = new Set();
  const uniq = list.filter(x => {
    const k = x.jobId + '|' + x.outName;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });
  saveRecent(uniq);
  renderRecent();
}
function fmtTs(ts){
  const d = new Date(ts); const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + ' 小时前';
  const days = Math.floor(diff/86400);
  if (days < 7) return days + ' 天前';
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function renderRecent(){
  const list = loadRecent();
  if (!list.length) { recentBlock.style.display = 'none'; return; }
  
  recentBlock.style.display = 'block';
  recentList.innerHTML = '';
  
  if (list.length > 3) {
    toggleRecentBtn.style.display = 'inline-block';
    toggleRecentBtn.textContent = recentExpanded ? '收起' : '展开';
  } else {
    toggleRecentBtn.style.display = 'none';
    recentExpanded = false;
  }

  const displayList = recentExpanded ? list : list.slice(0, 3);

  for (const r of displayList) {
    const div = document.createElement('div');
    div.className = 'recent-card';
    const dlHref = r.url || '#';
    const dlAttr = r.url ? `href="${r.url}" download="${escapeHtml(r.outName)}"` : `href="#" onclick="return false" style="opacity:.4"`;
    div.innerHTML = `
      <div class="recent-info">
        <div class="recent-name" title="${escapeHtml(r.outName)}">${escapeHtml(r.outName)}</div>
        <div class="recent-meta">${fmtSize(r.size)} · ${fmtTs(r.ts)}</div>
      </div>
      <a class="rdl" ${dlAttr}>下载</a>
    `;
    recentList.appendChild(div);
  }
}
renderRecent();

// ============ Toast ============
const toast = document.getElementById('statusToast');
const toastIcon = document.getElementById('toastIcon');
const toastTitle = document.getElementById('toastTitle');
const toastSub = document.getElementById('toastSub');
document.getElementById('toastClose').addEventListener('click', () => toast.classList.remove('show'));

let toastHideTimer = null;
function showToast(state, title, sub){
  clearTimeout(toastHideTimer);
  toast.classList.toggle('show', true);
  toastIcon.innerHTML = state === 'done'
    ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M5.6 9.8L3.15 7.35l1.1-1.1L5.6 7.6l4.3-4.3 1.1 1.1z"/></svg>'
    : '<div class="spin"></div>';
  toastTitle.textContent = title;
  toastSub.textContent = sub;
  if (state === 'done') toastHideTimer = setTimeout(() => toast.classList.remove('show'), 6000);
}
function isPageHidden(){ return document.visibilityState === 'hidden' || !document.hasFocus(); }
function refreshGlobalToast(){
  if (!isPageHidden()) { toast.classList.remove('show'); return; }
  const cards = Array.from(jobsEl.children);
  if (!cards.length) { toast.classList.remove('show'); return; }
  let totalAll = 0, doneAll = 0, failedAll = 0, running = 0;
  let currentName = '';
  let anyRunning = false;
  for (const c of cards) {
    const s = c._lastStatus;
    if (!s) continue;
    totalAll += s.total || 0; doneAll += s.done || 0; failedAll += s.failed || 0;
    if (s.status === 'running') { anyRunning = true; running++; if (!currentName && s.current) currentName = s.current; }
  }
  if (totalAll === 0) { toast.classList.remove('show'); return; }
  if (anyRunning) {
    showToast('running', `Converting · ${doneAll} / ${totalAll}`, currentName || `${running} batches`);
  } else {
    showToast('done', `${doneAll - failedAll} files converted`, `Ready to download`);
  }
}
document.addEventListener('visibilitychange', refreshGlobalToast);
window.addEventListener('blur', refreshGlobalToast);
window.addEventListener('focus', () => toast.classList.remove('show'));
setInterval(refreshGlobalToast, 1000);
</script>
