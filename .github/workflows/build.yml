name: Build Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (validate Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: motion2webp:ci
